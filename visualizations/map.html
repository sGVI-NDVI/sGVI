              .bindPopup('<b>Point: ' + point.pt_id + '</b><br>🌿 GVI: ' + point.gvi + '%<br>📸 ' + point.headings + '/8 directions');
        });
        
        var legend = L.control({position: 'bottomright'});
        legend.onAdd = function(map) {
            var div = L.DomUtil.create('div', 'legend');
            div.innerHTML = '<b>🌿 GVI</b><br>' +
                '<i style="background:#006400"></i> > 60%<br>' +
                '<i style="background:#228B22"></i> 40-60%<br>' +
                '<i style="background:#556B2F"></i> 20-40%<br>' +
                '<i style="background:#8B0000"></i> < 20%';
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>
